name: Rebuild index

on:
  push:
    branches: [main]
    paths:
      - "packs/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    name: Rebuild index.json + stats.json and commit
    runs-on: ubuntu-latest
    steps:
      - name: Check out registry with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install kbtransfer (provides kb_pack + kb_registry)
        # Same note as validate-pr.yml: reference/kb_pack and
        # reference/kb_registry have no individual pyproject; they ship
        # via the kbtransfer root wheel.
        run: pip install -e ./kbtransfer

      - name: Install registry script dependencies
        run: pip install -r scripts/requirements.txt

      - name: Regenerate index.json and stats.json
        run: python scripts/rebuild_index.py

      - name: Commit regenerated metadata if it changed
        run: |
          git config user.name "kbtransfer-bot"
          git config user.email "bot@kbtransfer.dev"
          git diff --quiet index.json stats.json || (
            git add index.json stats.json &&
            git commit -m "chore: rebuild index [skip ci]" &&
            git push
          )
