name: Rebuild index

on:
  push:
    branches: [main]
    paths:
      - "packs/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  rebuild:
    name: Rebuild index.json + stats.json via auto-merging PR
    runs-on: ubuntu-latest
    steps:
      - name: Check out registry with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install kbtransfer (provides kb_pack + kb_registry)
        # Same note as validate-pr.yml: reference/kb_pack and
        # reference/kb_registry have no individual pyproject; they ship
        # via the kbtransfer root wheel.
        run: pip install -e ./kbtransfer

      - name: Install registry script dependencies
        run: pip install -r scripts/requirements.txt

      - name: Regenerate index.json and stats.json
        run: python scripts/rebuild_index.py

      - name: Open auto-merging PR if metadata changed
        # Why a PR instead of a direct push to main:
        #   The branch ruleset on `main` requires four PR-context
        #   status checks (`check_single_file`, `detect_submission_type`,
        #   `validate_publisher`, `validate_pack`). A direct push from
        #   the workflow has none of those contexts and is rejected as
        #   "expected" but never reported. Repo-level rulesets do not
        #   expose GitHub Actions as a bypass actor, so we cannot
        #   exempt the bot from the rule.
        #
        # The workaround:
        #   - Commit only `index.json` + `stats.json` — root files,
        #     outside the `packs/**` and `publishers/**` path filters
        #     that gate validate-pr.yml. The PR therefore triggers
        #     ZERO required status checks; the ruleset is satisfied
        #     trivially.
        #   - Open the PR and immediately enable GitHub's native
        #     auto-merge (`gh pr merge --auto --squash`). Auto-merge
        #     fires the moment all required checks pass — which, here,
        #     is instantly.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "kbtransfer-bot"
          git config user.email "bot@kbtransfer.dev"

          # Bail out clean if rebuild_index.py produced no diff.
          if git diff --quiet index.json stats.json; then
            echo "No metadata change; nothing to commit."
            exit 0
          fi

          BRANCH="chore/rebuild-index-${GITHUB_RUN_ID}"
          git checkout -b "$BRANCH"
          git add index.json stats.json
          git commit -m "chore: rebuild index"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "chore: rebuild index" \
            --body "Automated index rebuild from push to main. \
          This PR only touches index.json and stats.json (paths that \
          do not trigger validate-pr.yml), so it has no required \
          status checks and merges immediately via --auto." \
            --base main \
            --head "$BRANCH"

          gh pr merge "$BRANCH" \
            --squash \
            --auto \
            --delete-branch
